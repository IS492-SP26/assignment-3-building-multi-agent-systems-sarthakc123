# Configuration file for Multi-Agent Research System
# You can modify these settings for their implementation

system:
  name: "Multi-Agent Research Assistant"
  topic: "HCI Research"  # Change this to your chosen topic
  max_iterations: 3     # Critic revision loop cap (was 10 — caused 5x runs)
  timeout_seconds: 300
  orchestrator: "langgraph"  # "autogen" or "langgraph"

agents:
  planner:
    role: "Task Planner"
    enabled: true
    # Custom system prompt (optional - leave empty to use default)
    # If provided, ensure it includes the handoff signal: "PLAN COMPLETE"
    system_prompt: ""  # Empty = use default prompt
    # Example custom prompt:
    # system_prompt: |
    #   You are an expert research planner specializing in HCI topics.
    #   Break down queries into specific, actionable research steps.
    #   Focus on recent publications (last 5 years) and seminal works.
    #   After creating the plan, say "PLAN COMPLETE".

  researcher:
    role: "Evidence Gatherer"
    enabled: true
    # Custom system prompt (optional - leave empty to use default)
    # If provided, ensure it mentions tools and includes: "RESEARCH COMPLETE"
    system_prompt: ""  # Empty = use default prompt
    max_sources: 10
    # Example custom prompt:
    # system_prompt: |
    #   You are a research specialist in HCI and UX design.
    #   Use web_search() and paper_search() tools to gather evidence.
    #   Prioritize peer-reviewed papers and authoritative sources.
    #   After collecting 8-10 sources, say "RESEARCH COMPLETE".

  writer:
    role: "Report Synthesizer"
    enabled: true
    # Custom system prompt (optional - leave empty to use default)
    # If provided, ensure it includes: "DRAFT COMPLETE"
    system_prompt: ""  # Empty = use default prompt
    # Example custom prompt:
    # system_prompt: |
    #   You are an academic writer specializing in HCI research.
    #   Synthesize findings with proper APA citations.
    #   Write in a clear, engaging style accessible to students.
    #   After completing the draft, say "DRAFT COMPLETE".

  critic:
    role: "Quality Verifier"
    enabled: true
    # Custom system prompt (optional - leave empty to use default)
    # If provided, ensure it includes: "APPROVED - RESEARCH COMPLETE" or "NEEDS REVISION"
    system_prompt: ""  # Empty = use default prompt
    # Example custom prompt:
    # system_prompt: |
    #   You are a peer reviewer for HCI research.
    #   Evaluate for academic rigor, source quality, and clarity.
    #   Be thorough but constructive in your feedback.
    #   Say "APPROVED - RESEARCH COMPLETE" or "NEEDS REVISION".

models:
  # Default model for agents (Groq, supports native tool calling).
  # llama-3.1-8b-instant is fast + has a generous separate daily quota.
  # Upgrade to llama-3.3-70b-versatile for higher quality if quota allows.
  default:
    provider: "groq"
    name: "llama-3.1-8b-instant"
    temperature: 0.7
    max_tokens: 1024

  # Judge model for evaluation — intentionally a DIFFERENT model family than the
  # agents to reduce correlated errors and avoid self-evaluation bias.
  # Agents use Meta's Llama 3.3 70B; judge uses an OpenAI architecture (gpt-oss 120B).
  judge:
    provider: "groq"
    name: "openai/gpt-oss-120b"
    temperature: 0.3
    max_tokens: 1024

  # Alternative: assignment-provided vLLM endpoint (Qwen/Qwen3-8B).
  # NOTE: this server does not currently accept tool/function calls,
  # so the Researcher agent's tools won't work on this path.
  # default:
  #   provider: "vllm"
  #   name: "Qwen/Qwen3-8B"
  #   temperature: 0.7
  #   max_tokens: 2048
  # judge:
  #   provider: "vllm"
  #   name: "Qwen/Qwen3-8B"
  #   temperature: 0.3
  #   max_tokens: 1024

tools:
  web_search:
    enabled: true
    provider: "tavily"  # or "brave"
    max_results: 5

  paper_search:
    enabled: false        # Semantic Scholar free tier is heavily rate-limited (429s
                          # take minutes to back off). Tavily web search picks up
                          # NIST/ACM/arXiv PDFs anyway. Re-enable for paper-heavy queries.
    provider: "semantic_scholar"
    max_results: 5

  citation_extraction:
    enabled: true

safety:
  enabled: true
  framework: "custom"  # "custom", "guardrails", "nemo_guardrails"
  log_events: true
  safety_log_file: "logs/safety_events.log"

  # Optional secondary layers
  use_llm_classifier: false  # if true, uses Groq for harmful content classification
  use_nemo: false             # if true, runs NeMo Guardrails as additional layer
  # NLI-based hallucination detection (bonus innovation).
  # Default OFF for interactive UI speed (~3 min faster per query).
  # Flip to true to demonstrate the feature end-to-end; ablation evidence
  # captured in outputs/sample_nli_ablation.json regardless.
  use_nli_check: false
  nli_max_claims: 6           # cap on claims extracted per response (cost control)

  # Input length thresholds
  min_query_length: 5
  max_query_length: 2000

  # Define prohibited categories (6 policy categories with default actions)
  prohibited_categories:
    - "prompt_injection"     # action: refuse
    - "harmful_content"      # action: refuse
    - "pii"                  # action: sanitize (redact)
    - "off_topic"            # action: redirect
    - "misinformation_risk"  # action: sanitize/flag (string-match grounding)
    - "unsupported_claim"    # action: sanitize/annotate (NLI-based grounding)

  # Default response strategy when category-specific action not given
  on_violation:
    action: "refuse"  # or "sanitize" or "redirect"
    message: "I cannot process this request due to safety policies."

evaluation:
  enabled: true
  num_test_queries: 10

  # Judge criteria
  criteria:
    - name: "relevance"
      weight: 0.25
      description: "How relevant is the response to the query?"

    - name: "evidence_quality"
      weight: 0.25
      description: "Quality of citations and evidence used"

    - name: "factual_accuracy"
      weight: 0.20
      description: "Factual correctness and consistency"

    - name: "safety_compliance"
      weight: 0.15
      description: "No unsafe or inappropriate content"

    - name: "clarity"
      weight: 0.15
      description: "Clarity and organization of response"

logging:
  level: "INFO"
  file: "logs/system.log"
  safety_log: "logs/safety_events.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
